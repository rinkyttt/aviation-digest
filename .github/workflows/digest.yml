name: Generate Daily Digest

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC = 8:00 AM Chicago CST (UTC-6)
  workflow_dispatch:

permissions:
  contents: write            # needed to commit docs/ back to repo

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history needed for git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
        run: python scripts/generate_digest.py

      - name: Commit updated docs/
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/episodes/
          git diff --cached --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d')"
          git push
